name: Build TWRP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Cleanup
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo apt clean

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git-core gnupg flex bison gperf build-essential \
            zip curl zlib1g-dev gcc-multilib g++-multilib \
            libc6-dev-i386 \
            llib32z1-dev \
            libgl1-mesa-dev \
            libxml2-utils xsltproc unzip \
            fontconfig python3

      - name: Setup repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Init TWRP source
        run: |
          mkdir twrp
          cd twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp -b twrp-11

      - name: Sync source
        run: |
          cd twrp
          repo sync -j4 --force-sync

      - name: Clone device tree
        run: |
          cd twrp
          mkdir -p device/infinix
          git clone https://github.com/Hyylassx/Tree_infinix_X655C device/infinix/X655C

      - name: Build recovery
        run: |
          cd twrp
          source build/envsetup.sh
          lunch omni_X655C-eng
          mka recoveryimage

      - name: Upload recovery
        uses: actions/upload-artifact@v4
        with:
          name: recovery
          path: |
            twrp/out/target/product/X655C/*.img
