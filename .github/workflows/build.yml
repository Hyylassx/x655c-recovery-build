name: Build TWRP Recovery

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Recovery
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Jakarta

    steps:
      - name: Cleanup Runner
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache
          sudo docker image prune --all --force
          sudo apt clean
          df -h

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git-core gnupg flex bison gperf build-essential \
            zip curl zlib1g-dev gcc-multilib g++-multilib \
            libc6-dev-i386 \
            lib32z1-dev \
            libgl1-mesa-dev \
            libxml2-utils xsltproc unzip \
            fontconfig python3 openjdk-11-jdk \
            rsync ccache

      - name: Set Java 11
        run: |
          sudo update-alternatives --set java /usr/lib/jvm/java-11-openjdk-amd64/bin/java
          java -version

      - name: Setup Git Identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Setup Repo Tool
        run: |
          mkdir -p ~/bin

          curl -L https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo

          chmod a+x ~/bin/repo

          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Init TWRP Source
        run: |
          mkdir twrp
          cd twrp

          repo init --depth=1 \
            -uhttps://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp \
            -b twrp-11

      - name: Sync Sources
        run: |
          cd twrp

          repo sync \
            -c \
            --no-clone-bundle \
            --no-tags \
            --force-sync \
            -j2

      - name: Clone Device Tree
        run: |
          cd twrp

          mkdir -p device/infinix

          git clone --depth=1 \
            -b android-10.0 \
            https://github.com/Hyylassx/Tree_infinix_X655C \
            device/infinix/X655C

      - name: Show Free Space
        run: |
          df -h

      - name: Setup Build Environment
        run: |
          cd twrp

          export ALLOW_MISSING_DEPENDENCIES=true
          export LC_ALL=C

          source build/envsetup.sh

          lunch omni_X655C-eng

      - name: Build Recovery
        run: |
          cd twrp

          export ALLOW_MISSING_DEPENDENCIES=true
          export LC_ALL=C

          source build/envsetup.sh

          lunch omni_X655C-eng

          mka recoveryimage -j$(nproc --all)

      - name: Verify Output
        run: |
          cd twrp/out/target/product/X655C

          echo "===== Generated Images ====="

          ls -lh *.img || true

      - name: Upload Recovery IMG
        uses: actions/upload-artifact@v4
        with:
          name: recovery-img
          path: |
            twrp/out/target/product/X655C/recovery.img

      - name: Upload All IMG Files
        uses: actions/upload-artifact@v4
        with:
          name: all-images
          path: |
            twrp/out/target/product/X655C/*.img

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            twrp/out/error.log
            twrp/out/verbose.log
            twrp/out/soong.log
