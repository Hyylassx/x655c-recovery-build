name: Build TWRP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: android-recovery-action
        uses: XenonTheInertG/android-recovery-action@v2.1.2
        with:
          MANIFEST_BRANCH: twrp-11
          DEVICE_TREE: https://github.com/Hyylassx/Tree_infinix_X655C
          DEVICE_TREE_BRANCH: main
          DEVICE_PATH: device/infinix/X655C
          LUNCH_TARGET: omni_X655C-eng
          BUILD_TARGET: recoveryimage
          SYNC_DEPTH: 1

      - name: Upload Recovery
        uses: actions/upload-artifact@v4
        with:
          name: recovery
          path: out/target/product/X655C/*.img
          UPLOAD_TO_RELEASE: true
